<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Model Performance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .perf-table { border-collapse: collapse; width: 100%; margin-top: 32px; }
    .perf-table th, .perf-table td { border: 1px solid #bbb; padding: 10px 16px; text-align: left; }
    .perf-table th { background: #f5f5f5; font-weight: 600; }
    .perf-table tr:nth-child(even) { background: #fafbfc; }
    .perf-table tr:hover { background: #f0f4f8; }
    .perf-desc { color: #666; font-size: 0.98em; }
    .perf-title { font-size: 2rem; font-weight: 700; margin-bottom: 18px; color: #222; }
    .perf-section { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 16px #0001; padding: 32px 36px; }
  </style>
</head>
<body>
  <div class="perf-section">
    <div class="perf-title">Model Performance</div>
    <table class="perf-table">
      <thead>
        <tr>
          <th>Metric</th>
          <th>Description</th>
          <th>Value</th>
          <th>Why show this?</th>
  </div>
  <!-- Model keep/discard section -->
  <div style="margin-top: 32px; text-align: center;">
    <div style="font-size: 1.1em; margin-bottom: 12px; color: #444;">Do you want to keep this fine-tuned model for your project?</div>
    <button id="btn-keep-model" style="padding: 10px 28px; font-size: 1.08em; margin-right: 18px; border-radius: 6px; border: 1.5px solid #4caf50; background: #f6fff6; color: #256029; cursor: pointer;">Keep Model</button>
    <button id="btn-discard-model" style="padding: 10px 28px; font-size: 1.08em; border-radius: 6px; border: 1.5px solid #f44336; background: #fff6f6; color: #a12727; cursor: pointer;">Discard Model</button>
    <div id="model-action-feedback" style="margin-top: 16px; font-size: 1em; color: #1a237e;"></div>
  </div>
  </div>

  <!-- Chart.js and model_performance.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='model_performance.js') }}"></script>

</body>
