<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f7faff;
    }
    .container {
      display: flex;
      flex-direction: row;
      max-width: 1100px;
      margin: 40px auto 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px #1976d220;
      padding: 32px 24px 32px 24px; /* reduced left padding */
      min-height: 600px;
    }
    .main-content {
      flex: 2;
      padding-right: 32px;
    }
    .side-panel {
      flex: 1;
      background: #f7faff;
      border-radius: 10px;
      box-shadow: 0 1px 8px #1976d210;
      padding: 24px 18px;
      margin-left: 0;
      min-width: 260px;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      height: fit-content;
    }
    .side-panel h3 {
      font-size: 1.15rem;
      color: #1976d2;
      margin-bottom: 10px;
      font-weight: 700;
    }
    #classDistChart {
      width: 100% !important;
      max-width: 260px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1976d2;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }
    h2 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #0d47a1;
      margin-top: 32px;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }
    label, input, button, select {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 1.08rem;
    }
    #uploadSection, #metaSection, #annotateSection {
      margin-bottom: 32px;
    }
    #uploadSection input[type="file"] {
      margin-bottom: 12px;
      font-size: 1.08rem;
    }
    #uploadBtn {
      margin-left: 12px;
      padding: 8px 22px;
      font-size: 1.08rem;
      border-radius: 6px;
      background: linear-gradient(90deg, #1976d2 0%, #42a5f5 100%);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #uploadBtn:hover {
      background: linear-gradient(90deg, #0d47a1 0%, #1976d2 100%);
    }
    #uploadMsg {
      margin-top: 10px;
      color: #388e3c;
      font-size: 1.05rem;
    }
    #metaInfo {
      font-size: 1.08rem;
      color: #333;
      background: #f7faff;
      border-radius: 6px;
      padding: 10px 16px;
      margin-top: 6px;
    }
    #manualBtn, #autoBtn {
      margin-right: 18px;
      margin-bottom: 10px;
      padding: 10px 26px;
      font-size: 1.08rem;
      border-radius: 6px;
      border: none;
      font-weight: 600;
      background: linear-gradient(90deg, #1976d2 0%, #42a5f5 100%);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    #manualBtn:hover, #autoBtn:hover {
      background: linear-gradient(90deg, #0d47a1 0%, #1976d2 100%);
    }
    .back-btn {
      margin-top: 32px;
      padding: 10px 24px;
      font-size: 1.08rem;
      border-radius: 6px;
      border: 1.5px solid #1976d2;
      background: #fff;
      color: #1976d2;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover {
      background: #1976d2;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-content">
      <h1 id="projectTitle"></h1>
      <div id="uploadSection">
        <h2>Step 1: Import Data (Upload Folder as .zip)</h2>
        <input type="file" id="zipInput" accept=".zip" />
        <button id="uploadBtn">Upload</button>
        <div id="uploadMsg"></div>
      </div>
      <div id="metaSection">
        <h2>Step 2: Project Metadata</h2>
        <div id="metaInfo"></div>
      </div>
      <div id="annotateSection">
        <h2>Step 3: Annotate Data</h2>
        <button id="manualBtn">📝 Manually Annotate Data</button>
        <button id="autoBtn" onclick="window.location.href='auto_annotate_dataset.html'">⚡ Automatic Annotation</button>
      </div>
      <button class="back-btn" onclick="window.location.href='index.html'">⬅️ Back to Home</button>
    </div>
    <div class="side-panel">
      <h3>Class Distribution</h3>
      <canvas id="classDistChart" height="120"></canvas>
      <div id="classDistMsg" style="color:#d32f2f;font-size:1.05rem;margin-top:8px;"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='project.js') }}"></script>
</body>
</body>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Fetch and display class distribution as a bar graph from manual_annotations.json for the selected project
document.addEventListener('DOMContentLoaded', function() {
  const projectName = (new URLSearchParams(window.location.search)).get('name');
  if (!projectName) return;
  fetch(`/projects/${encodeURIComponent(projectName)}/manual_annotations.json`)
    .then(res => res.json())
    .then(data => {
      if (!data || !data.images || !data.categories || data.categories.length === 0) {
        document.getElementById('classDistMsg').innerText = 'No annotation data.';
        return;
      }
      // Count class distribution
      const counts = {};
      data.categories.forEach(cat => counts[cat] = 0);
      Object.values(data.images).forEach(img => {
        (img.annotations || []).forEach(ann => {
          if (ann.label && counts.hasOwnProperty(ann.label)) counts[ann.label]++;
        });
      });
      const labels = data.categories;
      const values = labels.map(l => counts[l]);
      // Soft blue palette
      const bgColors = [
        'rgba(33, 150, 243, 0.35)',
        'rgba(100, 181, 246, 0.35)',
        'rgba(144, 202, 249, 0.35)',
        'rgba(30, 136, 229, 0.35)',
        'rgba(2, 119, 189, 0.35)'
      ];
      const borderColors = [
        'rgba(33, 150, 243, 1)',
        'rgba(100, 181, 246, 1)',
        'rgba(144, 202, 249, 1)',
        'rgba(30, 136, 229, 1)',
        'rgba(2, 119, 189, 1)'
      ];
      const ctx = document.getElementById('classDistChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Count',
            data: values,
            backgroundColor: labels.map((_,i)=>bgColors[i%bgColors.length]),
            borderColor: labels.map((_,i)=>borderColors[i%borderColors.length]),
            borderWidth: 2,
            borderRadius: 8,
            maxBarThickness: 48
          }]
        },
        options: {
          plugins: {
            legend: { display: false },
            tooltip: { enabled: true }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 15, family: 'Inter' }, color: '#1976d2' }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#e3eaf6' },
              ticks: { font: { size: 14, family: 'Inter' }, color: '#1976d2', stepSize: 1 }
            }
          }
        }
      });
    })
    .catch(() => {
      document.getElementById('classDistMsg').innerText = 'No annotation data.';
    });
});
</script>
</html>
</body>
</html>
